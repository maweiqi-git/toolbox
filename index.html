<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工具箱</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
  color: #1a1a1a;
  display: flex;
  flex-direction: column;
}

/* ====== 头部 ====== */
.header {
  background: linear-gradient(135deg, #4f6ef7 0%, #6c8cff 100%);
  color: #fff;
  text-align: center;
  padding: 60px 20px 52px;
}
.header h1 { font-size: 32px; margin-bottom: 8px; }
.header p { font-size: 15px; opacity: .85; }

/* ====== 内容区 ====== */
.main {
  max-width: 960px; width: 100%; margin: 0 auto;
  padding: 48px 24px 80px;
}

/* ====== 卡片网格 ====== */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 24px;
}

.card {
  background: #fff;
  border-radius: 12px;
  padding: 32px;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
  transition: transform .15s, box-shadow .15s;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  display: block;
}
.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(0,0,0,.1);
}

.card-icon {
  width: 52px; height: 52px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  margin-bottom: 18px;
}
.icon-blue   { background: #eef2ff; color: #4f6ef7; }
.icon-green  { background: #ecfdf5; color: #10b981; }
.icon-orange { background: #fff7ed; color: #f97316; }
.icon-purple { background: #f5f3ff; color: #8b5cf6; }
.icon-red    { background: #fef2f2; color: #ef4444; }
.icon-cyan   { background: #ecfeff; color: #06b6d4; }
.icon-pink   { background: #fdf2f8; color: #ec4899; }
.icon-teal   { background: #f0fdfa; color: #14b8a6; }

.card-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
.card-desc  { font-size: 14px; color: #888; line-height: 1.5; }

/* ====== 空占位卡 ====== */
.card.empty {
  border: 2px dashed #e0e0e0;
  background: transparent;
  box-shadow: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 140px;
  color: #c0c0c0;
  cursor: default;
}
.card.empty:hover { transform: none; box-shadow: none; }
.card.empty .plus { font-size: 36px; margin-bottom: 6px; }
.card.empty .text { font-size: 14px; }

</style>
</head>
<body>

<div class="header">
  <h1>工具箱</h1>
  <p>随手小工具集合，持续补充中</p>
</div>

<div class="main">

  <div class="grid">
    <a class="card" href="tools/logbook.html">
      <div class="card-icon icon-red">&#128203;</div>
      <div class="card-title">Logbook 速查</div>
      <div class="card-desc">各业务线泰山日志查询入口，按业务分组，点击应用名直达</div>
    </a>

    <a class="card" href="tools/sql_formatter.html">
      <div class="card-icon icon-blue">&#128225;</div>
      <div class="card-title">SQL 单号格式化</div>
      <div class="card-desc">粘贴单号自动加引号转逗号分隔，生成 IN 子句格式</div>
    </a>

    <a class="card" href="tools/json_formatter.html">
      <div class="card-icon icon-green">{ }</div>
      <div class="card-title">JSON 格式化</div>
      <div class="card-desc">美化、压缩、校验 JSON，一眼看清数据结构</div>
    </a>

    <a class="card" href="tools/timestamp.html">
      <div class="card-icon icon-orange">&#9202;</div>
      <div class="card-title">时间戳转换</div>
      <div class="card-desc">Unix 时间戳与日期互转，支持秒和毫秒</div>
    </a>

    <a class="card" href="tools/text_diff.html">
      <div class="card-icon icon-purple">&#8646;</div>
      <div class="card-title">文本差异对比</div>
      <div class="card-desc">逐行对比两份文本，标出新增、删除和相同行</div>
    </a>
  </div>

</div>

</body>
</html>
