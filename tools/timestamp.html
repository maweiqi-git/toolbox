<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>时间戳转换 - 工具箱</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f0f2f5; min-height: 100vh;
  display: flex; justify-content: center; align-items: flex-start; padding: 40px 20px;
}
.container {
  width: 100%; max-width: 600px; background: #fff;
  border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); padding: 32px;
}
.back { text-decoration: none; color: #4f6ef7; font-size: 14px; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 24px; }
.back:hover { color: #3b5de7; }
h1 { font-size: 22px; color: #1a1a1a; margin-bottom: 8px; }
.subtitle { font-size: 13px; color: #999; margin-bottom: 24px; }

/* 模式切换 */
.tabs { display: flex; gap: 0; margin-bottom: 20px; border-radius: 8px; overflow: hidden; border: 1.5px solid #e0e0e0; }
.tab {
  flex: 1; padding: 10px 0; text-align: center; font-size: 14px; cursor: pointer;
  background: #fafafa; color: #666; border: none; transition: all .15s;
}
.tab.active { background: #4f6ef7; color: #fff; font-weight: 500; }

/* 当前时间 */
.now { font-size: 13px; color: #888; margin-bottom: 20px; padding: 12px; background: #f8f9fa; border-radius: 8px; text-align: center; }
.now span { font-weight: 600; color: #4f6ef7; }

/* 输入输出 */
.row { margin-bottom: 16px; }
.label { font-size: 14px; color: #333; font-weight: 500; margin-bottom: 8px; display: flex; justify-content: space-between; }
.label .hint { font-size: 12px; color: #999; font-weight: 400; }
input, textarea {
  width: 100%; border: 1.5px solid #e0e0e0; border-radius: 8px;
  padding: 14px; font-size: 14px; font-family: "SF Mono", Monaco, monospace;
  line-height: 1.5; transition: border-color .2s; outline: none;
}
input:focus, textarea:focus { border-color: #4f6ef7; }
input { height: 48px; }
textarea { height: 100px; resize: vertical; background: #f8f9fa; }
.actions { display: flex; gap: 12px; margin-top: 20px; }
.btn {
  padding: 10px 24px; border: none; border-radius: 8px;
  font-size: 14px; font-weight: 500; cursor: pointer; transition: all .2s;
}
.btn-primary { background: #4f6ef7; color: #fff; }
.btn-primary:hover { background: #3b5de7; }
.btn-secondary { background: #f0f2f5; color: #333; }
.btn-secondary:hover { background: #e4e6eb; }

#result-list { margin-top: 16px; }
.result-item {
  padding: 12px 16px; background: #f8f9fa; border-radius: 8px; margin-bottom: 8px;
  display: flex; justify-content: space-between; align-items: center;
}
.result-item .name { font-size: 13px; color: #888; flex-shrink: 0; margin-right: 12px; }
.result-item .value { font-size: 14px; font-family: "SF Mono", Monaco, monospace; color: #333; word-break: break-all; }
.result-item .copy-btn { flex-shrink: 0; margin-left: 12px; padding: 4px 12px; font-size: 12px; border: 1px solid #e0e0e0; background: #fff; border-radius: 4px; cursor: pointer; color: #4f6ef7; }
.result-item .copy-btn:hover { background: #4f6ef7; color: #fff; border-color: #4f6ef7; }

.tips {
  margin-top: 20px; padding: 12px 16px; background: #fffbe6;
  border: 1px solid #ffe58f; border-radius: 8px; font-size: 13px; color: #8c6e00; display: none;
}
.tips.show { display: block; }
</style>
</head>
<body>

<div class="container">
  <a class="back" href="../index.html">&larr; 返回工具箱</a>
  <h1>时间戳转换</h1>
  <p class="subtitle">Unix 时间戳与日期互转，支持秒和毫秒</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('date')">时间戳 → 日期</button>
    <button class="tab" onclick="switchTab('ts')">日期 → 时间戳</button>
  </div>

  <div class="now">当前时间戳：<span id="now-ts">-</span> ｜ <span id="now-date">-</span></div>

  <!-- 时间戳 → 日期 -->
  <div id="panel-to-date">
    <div class="row">
      <div class="label"><span>输入时间戳</span><span class="hint">支持秒（10位）或毫秒（13位）</span></div>
      <input id="ts-input" placeholder="例如：1716883200 或 1716883200000" oninput="tsToDate()">
    </div>
    <div id="result-list"></div>
  </div>

  <!-- 日期 → 时间戳 -->
  <div id="panel-to-ts" style="display:none">
    <div class="row">
      <div class="label"><span>输入日期时间</span></div>
      <input id="date-input" type="datetime-local" oninput="dateToTs()" style="font-family: inherit;">
    </div>
    <textarea id="ts-result" readonly placeholder="转换结果显示在这里"></textarea>
  </div>

  <div class="tips" id="tips">已复制</div>
</div>

<script>
// 实时更新时间
function updateNow() {
  var now = new Date();
  var s = Math.floor(now.getTime() / 1000);
  var ms = now.getTime();
  document.getElementById('now-ts').textContent = s;
  document.getElementById('now-date').textContent = formatDate(now);
}
updateNow();
setInterval(updateNow, 1000);

function formatDate(d) {
  var y = d.getFullYear();
  var M = pad(d.getMonth() + 1);
  var D = pad(d.getDate());
  var h = pad(d.getHours());
  var m = pad(d.getMinutes());
  var s = pad(d.getSeconds());
  return y + '-' + M + '-' + D + ' ' + h + ':' + m + ':' + s;
}
function pad(n) { return n < 10 ? '0' + n : n; }

var currentTab = 'date';
function switchTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach(function(el) { el.classList.remove('active'); });
  event.target.classList.add('active');
  document.getElementById('panel-to-date').style.display = t === 'date' ? 'block' : 'none';
  document.getElementById('panel-to-ts').style.display = t === 'ts' ? 'block' : 'none';
  if (t === 'date') tsToDate(); else dateToTs();
}

// 时间戳 → 日期
function tsToDate() {
  var val = document.getElementById('ts-input').value.trim();
  var list = document.getElementById('result-list');
  if (!val) { list.innerHTML = ''; return; }

  var ts = parseInt(val);
  if (isNaN(ts)) { list.innerHTML = ''; return; }

  // 判断秒还是毫秒
  var isMs = ts > 9999999999;
  var d = isMs ? new Date(ts) : new Date(ts * 1000);
  if (d.toString() === 'Invalid Date') { list.innerHTML = ''; return; }

  var gmt = d.toUTCString();
  var local = formatDate(d);
  var iso = d.toISOString();
  var week = ['日','一','二','三','四','五','六'][d.getDay()];

  list.innerHTML = [
    { name: '本地时间', value: local + ' 星期' + week },
    { name: 'UTC 时间', value: gmt },
    { name: 'ISO 8601', value: iso },
    { name: '秒时间戳', value: String(Math.floor(d.getTime() / 1000)) },
    { name: '毫秒时间戳', value: String(d.getTime()) },
  ].map(function(item) {
    return '<div class="result-item"><span class="name">' + item.name + '</span><span class="value">' + item.value + '</span><button class="copy-btn" onclick="copyText(\'' + item.value + '\')">复制</button></div>';
  }).join('');
}

// 日期 → 时间戳
function dateToTs() {
  var val = document.getElementById('date-input').value;
  var area = document.getElementById('ts-result');
  if (!val) { area.value = ''; return; }

  var d = new Date(val);
  var s = String(Math.floor(d.getTime() / 1000));
  var ms = String(d.getTime());
  area.value = '秒（10位）:  ' + s + '\n毫秒（13位）:' + ms;
}

// 复制
function copyText(txt) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(txt);
  }
  var tips = document.getElementById('tips');
  tips.classList.add('show');
  setTimeout(function() { tips.classList.remove('show'); }, 1500);
}

// 初始填充当前时间戳
document.getElementById('date-input').value = new Date().toISOString().slice(0, 16);
</script>
</body>
</html>
