<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logbook 速查 - 工具箱</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f0f2f5;
  min-height: 100vh;
}
.topbar { max-width: 1200px; margin: 0 auto; padding: 24px 20px 0; }
.back {
  text-decoration: none; color: #4f6ef7; font-size: 14px;
  display: inline-flex; align-items: center; gap: 4px;
}
.back:hover { color: #3b5de7; }
.header { max-width: 1200px; margin: 0 auto; padding: 16px 20px 16px; }
.header h1 { font-size: 24px; color: #1a1a1a; }
.header p  { font-size: 13px; color: #999; margin-top: 4px; }

.main { max-width: 1200px; margin: 0 auto; padding: 0 20px 80px; position: relative; }

/* 卡片网格 */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
}

/* 卡片 */
.cat-card {
  background: #fff; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.06);
  cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 36px 24px; text-align: center; min-height: 150px;
  transition: box-shadow .25s ease, transform .25s ease;
}
.cat-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.1); }

.cat-card .dot {
  width: 56px; height: 56px; border-radius: 14px; margin-bottom: 16px;
  display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0;
}
.cat-card .name { font-size: 18px; font-weight: 600; color: #1a1a1a; }
.cat-card .quick { font-size: 13px; color: #999; margin-top: 6px; }

/* 颜色 */
.c-red    .dot { background: #fef2f2; color: #ef4444; }
.c-blue   .dot { background: #eef2ff; color: #4f6ef7; }
.c-green  .dot { background: #ecfdf5; color: #10b981; }
.c-orange .dot { background: #fff7ed; color: #f97316; }
.c-purple .dot { background: #f5f3ff; color: #8b5cf6; }
.c-cyan   .dot { background: #ecfeff; color: #06b6d4; }
.c-teal   .dot { background: #f0fdfa; color: #14b8a6; }
.c-pink   .dot { background: #fdf2f8; color: #ec4899; }
.c-gray   .dot { background: #f3f4f6; color: #6b7280; }
.c-slate  .dot { background: #f1f5f9; color: #64748b; }

/* 遮罩 */
.overlay {
  display: none;
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,.3); z-index: 99;
}
.overlay.show { display: block; }

/* 详情面板 */
.detail-panel {
  display: none;
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 95%; max-width: 1200px; max-height: 85vh;
  background: #fff; border-radius: 16px; box-shadow: 0 12px 48px rgba(0,0,0,.2);
  padding: 36px; overflow-y: auto; z-index: 100;
}
.detail-panel.show { display: block; }

.detail-panel .dp-close {
  position: absolute; top: 16px; right: 20px;
  width: 36px; height: 36px; border-radius: 50%; border: none;
  background: #f0f2f5; font-size: 18px; cursor: pointer; color: #666;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s;
}
.detail-panel .dp-close:hover { background: #e0e0e0; }

.detail-panel .dp-title {
  font-size: 24px; font-weight: 600; margin-bottom: 16px;
  padding-bottom: 14px; border-bottom: 1px solid #eee;
  display: flex; align-items: center; gap: 10px;
}
.detail-panel .dp-dot {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
}

.quick-links { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
.quick-links a {
  font-size: 13px; color: #4f6ef7; text-decoration: none;
  padding: 5px 14px; background: #eef2ff; border-radius: 14px;
}
.quick-links a:hover { background: #dde4ff; }

.link-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 4px;
}
.link-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 14px; border-radius: 6px; font-size: 14px;
  transition: background .15s;
  background: #fafbfc;
}
.link-item:nth-child(even) { background: #f5f6f8; }
.link-item:hover { background: #eef2ff; }
.link-item .desc { color: #555; }
.link-item .app {
  color: #4f6ef7; text-decoration: none; font-family: "SF Mono", Monaco, monospace;
  font-size: 13px; margin-left: 12px; white-space: nowrap;
}
.link-item .app:hover { text-decoration: underline; }
.link-item .note-btn {
  margin-left: 8px; width: 24px; height: 24px; border-radius: 50%;
  border: 1px solid #e0e0e0; background: #fff; cursor: pointer; font-size: 12px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  color: #999; transition: all .15s;
}
.link-item .note-btn:hover { border-color: #4f6ef7; color: #4f6ef7; background: #eef2ff; }
.link-item .note-btn.has-note { border-color: #f59e0b; color: #f59e0b; background: #fffbeb; }
.note-row { margin-top: 4px; padding: 6px 10px; display: none; }
.note-row.show { display: flex; gap: 8px; align-items: center; }
.note-row input {
  flex: 1; border: 1px solid #e0e0e0; border-radius: 6px;
  padding: 6px 10px; font-size: 13px; outline: none; font-family: inherit;
}
.note-row input:focus { border-color: #4f6ef7; }
.note-row .note-save {
  padding: 6px 14px; border: none; border-radius: 6px;
  background: #4f6ef7; color: #fff; font-size: 12px; cursor: pointer;
  white-space: nowrap;
}
.note-row .note-text { font-size: 13px; color: #888; padding-left: 4px; }
.note-row .note-del {
  background: none; border: none; font-size: 14px; cursor: pointer;
  color: #ccc; padding: 2px 6px;
}
.note-row .note-del:hover { color: #ef4444; }
</style>
</head>

function openDetail(name, color, bg, emoji, idx) {
  var d = data[idx];

  document.getElementById('dp-title').innerHTML = '<span class="dp-dot" style="background:' + bg + ';color:' + color + '">' + emoji + '</span>' + d.name;

  var quickHTML = d.quick.map(function(q) {
    return '<a href="' + q.u + '" target="_blank">' + q.t + '</a>';
  }).join('');
  document.getElementById('dp-quick').innerHTML = quickHTML;

  var linksHTML = d.links.map(function(l, i) {
    var appUrl = 'http://taishan.jd.com/logbook/query/history?appName=' + l[1] + '&platform=jdos';
    var noteKey = 'logbook_note_' + l[1];
    var saved = localStorage.getItem(noteKey) || '';
    var hasClass = saved ? ' has-note' : '';
    var noteTitle = saved ? '备注: ' + saved.substring(0, 20) + '...' : '添加备注';
    return '<div class="link-item">' +
      '<span class="desc">' + l[0] + '</span>' +
      '<a class="app" href="' + appUrl + '" target="_blank">' + l[1] + '</a>' +
      '<button class="note-btn' + hasClass + '" title="' + noteTitle + '" onclick="toggleNote(event, \'' + noteKey + '\', \'' + l[1] + '\')">' + (saved ? '&#9993;' : '+') + '</button>' +
      '<div class="note-row" id="nr-' + idx + '-' + i + '">' +
        (saved ? '<span class="note-text" id="nt-' + idx + '-' + i + '">' + saved + '</span>' +
         '<button class="note-del" onclick="delNote(event, \'' + noteKey + '\', \'' + idx + '-' + i + '\')">&#10005;</button>' : '') +
        '<input id="ni-' + idx + '-' + i + '" placeholder="写点备注..." value="' + saved + '">' +
        '<button class="note-save" onclick="saveNote(event, \'' + noteKey + '\', \'' + idx + '-' + i + '\', \'' + l[1] + '\')">保存</button>' +
      '</div></div>';
  }).join('');
  document.getElementById('dp-links').innerHTML = linksHTML;

  overlay.classList.add('show');
  panel.classList.add('show');
}

function closeDetail() {
  overlay.classList.remove('show');
  panel.classList.remove('show');
}

document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeDetail(); });

function toggleNote(e, key, app) {
  e.stopPropagation();
  var row = e.target.nextElementSibling;
  row.classList.toggle('show');
  var input = row.querySelector('input');
  if (row.classList.contains('show')) {
    input.focus();
    if (!input.value) {
      input.value = localStorage.getItem(key) || '';
    }
  }
}

function saveNote(e, key, cellId, app) {
  e.stopPropagation();
  var row = e.target.parentElement;
  var input = document.getElementById('ni-' + cellId);
  var val = input.value.trim();
  if (val) {
    localStorage.setItem(key, val);
  } else {
    localStorage.removeItem(key);
  }
  row.classList.remove('show');
  updateNoteBtn(cellId, key, app);
  refreshNoteDisplay(cellId, val);
}

function delNote(e, key, cellId) {
  e.stopPropagation();
  localStorage.removeItem(key);
  var row = document.getElementById('nr-' + cellId);
  row.classList.add('show');
  document.getElementById('ni-' + cellId).value = '';
  var textEl = document.getElementById('nt-' + cellId);
  if (textEl) textEl.remove();
  e.target.remove();
  updateNoteBtn(cellId, key, '');
}

function updateNoteBtn(cellId, key, app) {
  var row = document.getElementById('nr-' + cellId);
  var btn = row.previousElementSibling;
  // find the note-btn
  while (btn && !btn.classList.contains('note-btn')) {
    btn = btn.previousElementSibling;
  }
  if (!btn) return;
  var saved = localStorage.getItem(key) || '';
  if (saved) {
    btn.classList.add('has-note');
    btn.innerHTML = '&#9993;';
    btn.title = '备注: ' + saved.substring(0, 20) + (saved.length > 20 ? '...' : '');
  } else {
    btn.classList.remove('has-note');
    btn.innerHTML = '+';
    btn.title = '添加备注';
  }
}

function refreshNoteDisplay(cellId, val) {
  var row = document.getElementById('nr-' + cellId);
  var existingText = document.getElementById('nt-' + cellId);
  var existingDel = row.querySelector('.note-del');
  if (val) {
    if (existingText) {
      existingText.textContent = val;
    } else {
      var span = document.createElement('span');
      span.className = 'note-text';
      span.id = 'nt-' + cellId;
      span.textContent = val;
      row.insertBefore(span, row.querySelector('input'));
      var del = document.createElement('button');
      del.className = 'note-del';
      del.textContent = '✕';
      del.onclick = function(ev) { delNote(ev, 'logbook_note_' + cellId.split('-').slice(1).join('-'), cellId); };
      row.insertBefore(del, row.querySelector('input'));
    }
  } else {
    if (existingText) existingText.remove();
    if (existingDel) existingDel.remove();
  }
}
</script>
