<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON 对比 - 工具箱</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f0f2f5; min-height: 100vh;
  display: flex; justify-content: center; align-items: flex-start; padding: 40px 20px;
}
.container {
  width: 100%; max-width: 1400px; background: #fff;
  border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); padding: 32px;
}
.back { text-decoration: none; color: #4f6ef7; font-size: 14px; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 14px; }
.back:hover { color: #3b5de7; }
h1 { font-size: 22px; color: #1a1a1a; margin-bottom: 16px; }

/* 双栏输入 */
.input-row { display: flex; gap: 20px; margin-bottom: 16px; }
.input-col { flex: 1; }
.label { font-size: 14px; color: #333; font-weight: 500; margin-bottom: 8px; }
textarea {
  width: 100%; border: 1.5px solid #e0e0e0; border-radius: 8px;
  padding: 14px; font-size: 13px; font-family: "SF Mono", Monaco, monospace;
  line-height: 1.6; resize: none; transition: border-color .2s; outline: none;
  height: 280px;
}
textarea:focus { border-color: #4f6ef7; }

.toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
.btn {
  padding: 8px 18px; border: none; border-radius: 8px;
  font-size: 13px; font-weight: 500; cursor: pointer; transition: all .2s;
}
.btn-primary { background: #4f6ef7; color: #fff; }
.btn-primary:hover { background: #3b5de7; }
.btn-secondary { background: #f0f2f5; color: #333; }
.btn-secondary:hover { background: #e4e6eb; }

.error-msg {
  padding: 8px 14px; background: #fef2f2; border: 1px solid #fecaca;
  border-radius: 6px; font-size: 13px; color: #dc2626; display: none; margin-bottom: 12px;
}
.error-msg.show { display: block; }

.stats { font-size: 13px; color: #888; margin-left: 8px; display: flex; gap: 14px; }
.stats b { font-weight: 600; }
.stats .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 2px; vertical-align: middle; }

/* 结果区 */
.result-title { font-size: 14px; color: #333; font-weight: 500; margin-bottom: 8px; }
#result { font-size: 13px; font-family: "SF Mono", Monaco, monospace; line-height: 1.7; }
.diff-tree { border: 1.5px solid #e0e0e0; border-radius: 8px; padding: 16px; max-height: 500px; overflow: auto; }

.diff-item { margin-left: 0; }
.diff-key { display: inline-flex; align-items: center; gap: 4px; }
.diff-key .arrow { width: 16px; font-size: 10px; color: #999; cursor: pointer; user-select: none; display: inline-block; text-align: center; flex-shrink: 0; }
.diff-key .arrow:hover { color: #333; }

.diff-line { padding: 2px 4px; white-space: nowrap; }
.diff-line.add { background: #e6ffec; }
.diff-line.add .key-name { color: #0a7e3f; }
.diff-line.del { background: #ffebe9; }
.diff-line.del .key-name { color: #c62828; }
.diff-line.change { background: #fff8e5; }
.diff-line.change .key-name { color: #b85e00; }
.diff-line.same { }
.diff-line.same .key-value { color: #888; }

.key-name { color: #881391; font-weight: 500; }
.key-value { color: #1a1a2e; }
.key-type-null { color: #999; }
.key-type-string { color: #0a7e3f; }
.key-type-number { color: #0550ae; }
.key-type-bool { color: #0550ae; }
.key-bracket { color: #666; }

.children { padding-left: 20px; }
.children.collapsed { display: none; }
.sig { font-size: 11px; padding: 1px 4px; border-radius: 3px; margin-left: 4px; }
.sig.add { background: #e6ffec; color: #0a7e3f; }
.sig.del { background: #ffebe9; color: #c62828; }
.sig.change { background: #fff8e5; color: #b85e00; }

.empty-hint { text-align: center; padding: 40px; color: #ccc; font-size: 14px; }
</style>
</head>
<body>

<div class="container">
  <a class="back" href="../index.html">&larr; 返回工具箱</a>
  <h1>JSON 对比</h1>

  <div class="input-row">
    <div class="input-col">
      <div class="label">原始 JSON</div>
      <textarea id="left-input" placeholder='粘贴第一个 JSON'></textarea>
    </div>
    <div class="input-col">
      <div class="label">对比 JSON</div>
      <textarea id="right-input" placeholder='粘贴第二个 JSON'></textarea>
    </div>
  </div>

  <div class="error-msg" id="error-msg"></div>

  <div class="toolbar">
    <button class="btn btn-primary" onclick="doDiff()">对比</button>
    <button class="btn btn-secondary" onclick="swapText()">交换</button>
    <button class="btn btn-secondary" onclick="clearAll()">清空</button>
    <button class="btn btn-secondary" onclick="loadDemo()">示例</button>
    <span class="stats" id="stats"></span>
  </div>

  <div class="result-title">对比结果</div>
  <div class="diff-tree" id="result">
    <div class="empty-hint">输入 JSON 后点击「对比」</div>
  </div>
</div>

<script>
var leftEl = document.getElementById('left-input');
var rightEl = document.getElementById('right-input');
var resultEl = document.getElementById('result');
var errorEl = document.getElementById('error-msg');
var statsEl = document.getElementById('stats');

function doDiff() {
  var leftRaw = leftEl.value.trim();
  var rightRaw = rightEl.value.trim();
  errorEl.classList.remove('show');
  statsEl.innerHTML = '';

  if (!leftRaw && !rightRaw) {
    resultEl.innerHTML = '<div class="empty-hint">输入 JSON 后点击「对比」</div>';
    return;
  }

  var leftObj, rightObj;
  try { leftObj = JSON.parse(leftRaw || '{}'); } catch(e) {
    errorEl.textContent = '原始 JSON 解析错误: ' + e.message; errorEl.classList.add('show'); return;
  }
  try { rightObj = JSON.parse(rightRaw || '{}'); } catch(e) {
    errorEl.textContent = '对比 JSON 解析错误: ' + e.message; errorEl.classList.add('show'); return;
  }

  var diffs = compareJSON(leftObj, rightObj, '');

  var addC = 0, delC = 0, changeC = 0, sameC = 0;
  function count(arr) {
    arr.forEach(function(d) {
      if (d.type === 'add') addC++;
      else if (d.type === 'del') delC++;
      else if (d.type === 'change') changeC++;
      else sameC++;
      if (d.children) count(d.children);
    });
  }
  count(diffs);

  resultEl.innerHTML = diffs.length === 0
    ? '<div class="empty-hint">两个 JSON 完全一致</div>'
    : renderTree(diffs);

  statsEl.innerHTML =
    '<span><span class="dot" style="background:#e6ffec;border:1px solid #0a7e3f"></span> 新增 <b style="color:#0a7e3f">' + addC + '</b></span>' +
    '<span><span class="dot" style="background:#ffebe9;border:1px solid #c62828"></span> 删除 <b style="color:#c62828">' + delC + '</b></span>' +
    '<span><span class="dot" style="background:#fff8e5;border:1px solid #b85e00"></span> 修改 <b style="color:#b85e00">' + changeC + '</b></span>' +
    '<span><span class="dot" style="background:#f0f2f5;border:1px solid #999"></span> 相同 <b>' + sameC + '</b></span>';
}

// 递归对比 JSON 结构
function compareJSON(a, b, path) {
  var result = [];
  var allKeys = {};
  if (a && typeof a === 'object' && !Array.isArray(a)) Object.keys(a).forEach(function(k) { allKeys[k] = 1; });
  if (b && typeof b === 'object' && !Array.isArray(b)) Object.keys(b).forEach(function(k) { allKeys[k] = 1; });

  var keys = Object.keys(allKeys).sort();
  if (keys.length === 0) {
    // 基本类型比较
    if (a !== b) {
      result.push({ type: 'change', key: path, oldVal: a, newVal: b });
    }
    return result;
  }

  keys.forEach(function(k) {
    var fullPath = path ? path + '.' + k : k;
    var va = a && typeof a === 'object' && !Array.isArray(a) ? a[k] : undefined;
    var vb = b && typeof b === 'object' && !Array.isArray(b) ? b[k] : undefined;

    if (va === undefined && vb !== undefined) {
      result.push({ type: 'add', key: k, val: vb, path: fullPath, children: flattenObj(vb, fullPath).map(function(x) { x.type = 'add'; return x; }) });
    } else if (va !== undefined && vb === undefined) {
      result.push({ type: 'del', key: k, val: va, path: fullPath, children: flattenObj(va, fullPath).map(function(x) { x.type = 'del'; return x; }) });
    } else if (isObject(va) && isObject(vb)) {
      var children = compareJSON(va, vb, fullPath);
      if (children.length > 0) {
        result.push({ type: 'change', key: k, path: fullPath, children: children });
      } else {
        result.push({ type: 'same', key: k, val: va, path: fullPath });
      }
    } else if (va !== vb) {
      result.push({ type: 'change', key: k, oldVal: va, newVal: vb, path: fullPath });
    } else {
      result.push({ type: 'same', key: k, val: va, path: fullPath });
    }
  });

  return result;
}

function isObject(v) {
  return v !== null && typeof v === 'object' && !Array.isArray(v);
}

function flattenObj(obj, prefix) {
  if (!isObject(obj)) return [{ key: prefix, val: obj }];
  var result = [];
  Object.keys(obj).sort().forEach(function(k) {
    var p = prefix ? prefix + '.' + k : k;
    if (isObject(obj[k])) {
      result = result.concat(flattenObj(obj[k], p));
    } else {
      result.push({ key: k, val: obj[k], path: p });
    }
  });
  return result;
}

function renderTree(diffs, depth) {
  depth = depth || 0;
  var html = '';
  diffs.forEach(function(d) {
    var lineClass = d.type;
    var isObj = isObject(d.val) || (!d.oldVal && d.children && d.children.length > 0);

    html += '<div class="diff-item">';
    html += '<div class="diff-line ' + lineClass + '">';

    if (d.children && d.children.length > 0) {
      html += '<span class="diff-key">';
      html += '<span class="arrow" onclick="toggleChildren(this)">&#9660;</span>';
      html += '<span class="key-name">"' + esc(d.key) + '"</span>';
      html += '<span class="key-bracket">: {</span>';
      if (d.type === 'add') html += '<span class="sig add">新增</span>';
      if (d.type === 'del') html += '<span class="sig del">删除</span>';
      if (d.type === 'change') html += '<span class="sig change">有修改</span>';
      html += '</span>';
      html += '<div class="children">' + renderTree(d.children, depth + 1) + '</div>';
      html += '<span class="key-bracket">}</span>';
    } else if (d.type === 'change' && d.oldVal !== undefined) {
      html += '<span class="diff-key">';
      html += '<span class="key-name">"' + esc(d.key) + '"</span>: ';
      html += '<span class="key-value key-type-string">' + formatVal(d.oldVal) + '</span>';
      html += ' → ';
      html += '<span class="key-value key-type-string">' + formatVal(d.newVal) + '</span>';
      html += '</span>';
    } else if (d.type === 'add') {
      html += '<span class="diff-key">';
      html += '<span class="key-name">"' + esc(d.key) + '"</span>: ';
      html += '<span class="key-value">' + formatVal(d.val) + '</span>';
      html += '<span class="sig add">新增</span>';
      html += '</span>';
    } else if (d.type === 'del') {
      html += '<span class="diff-key">';
      html += '<span class="key-name">"' + esc(d.key) + '"</span>: ';
      html += '<span class="key-value">' + formatVal(d.val) + '</span>';
      html += '<span class="sig del">删除</span>';
      html += '</span>';
    } else {
      html += '<span class="diff-key">';
      html += '<span class="key-name">"' + esc(d.key) + '"</span>: ';
      html += '<span class="key-value">' + formatVal(d.val) + '</span>';
      html += '</span>';
    }
    html += '</div></div>';
  });
  return html;
}

function formatVal(v) {
  if (v === null || v === undefined) return '<span class="key-type-null">null</span>';
  if (typeof v === 'string') return '<span class="key-type-string">"' + esc(v) + '"</span>';
  if (typeof v === 'number') return '<span class="key-type-number">' + v + '</span>';
  if (typeof v === 'boolean') return '<span class="key-type-bool">' + v + '</span>';
  return String(v);
}

function toggleChildren(arrow) {
  var children = arrow.parentElement.parentElement.querySelector('.children');
  if (!children) return;
  var collapsed = children.classList.toggle('collapsed');
  arrow.textContent = collapsed ? '&#9654;' : '&#9660;';
}

function esc(t) { return String(t).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

function swapText() {
  var tmp = leftEl.value; leftEl.value = rightEl.value; rightEl.value = tmp;
  doDiff();
}
function clearAll() {
  leftEl.value = ''; rightEl.value = '';
  resultEl.innerHTML = '<div class="empty-hint">输入 JSON 后点击「对比」</div>';
  errorEl.classList.remove('show'); statsEl.innerHTML = '';
}
function loadDemo() {
  leftEl.value = '{"name":"张三","age":25,"city":"北京","items":["apple","banana"]}';
  rightEl.value = '{"name":"张三","age":30,"city":"上海","items":["apple","orange"],"gender":"男"}';
  doDiff();
}
</script>
</body>
</html>
