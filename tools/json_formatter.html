<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSON 格式化 - 工具箱</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #f0f2f5; min-height: 100vh;
  display: flex; justify-content: center; align-items: flex-start; padding: 40px 20px;
}
.container {
  width: 100%; max-width: 1400px; background: #fff;
  border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08); padding: 32px;
}
.back { text-decoration: none; color: #4f6ef7; font-size: 14px; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 24px; }
.back:hover { color: #3b5de7; }
h1 { font-size: 22px; color: #1a1a1a; margin-bottom: 8px; }
.subtitle { font-size: 13px; color: #999; margin-bottom: 20px; }

/* 左右双栏 */
.main-row { display: flex; gap: 20px; }
.col-left { flex: 0 0 38%; display: flex; flex-direction: column; min-width: 0; }
.col-right { flex: 1; display: flex; flex-direction: column; min-width: 0; }

.label { font-size: 14px; color: #333; font-weight: 500; margin-bottom: 8px; display: flex; justify-content: space-between; }
.label .hint { font-size: 12px; color: #999; font-weight: 400; }
.stat { font-size: 12px; color: #4f6ef7; }

textarea {
  width: 100%; border: 1.5px solid #e0e0e0; border-radius: 8px;
  padding: 14px; font-size: 13px; font-family: "SF Mono", Monaco, "Cascadia Code", monospace;
  line-height: 1.6; resize: none; transition: border-color .2s; outline: none;
  height: 520px;
}
textarea:focus { border-color: #4f6ef7; }
#output-area { background: #f8f9fa; }

.option-row { display: flex; gap: 14px; align-items: center; margin: 12px 0; flex-wrap: wrap; }
.option-row label { font-size: 13px; color: #666; display: flex; align-items: center; gap: 4px; cursor: pointer; white-space: nowrap; }
.option-row input[type="number"] { width: 44px; border: 1.5px solid #e0e0e0; border-radius: 4px; padding: 4px 6px; font-size: 13px; text-align: center; }

.actions { display: flex; gap: 10px; flex-wrap: wrap; }
.btn {
  padding: 8px 18px; border: none; border-radius: 8px;
  font-size: 13px; font-weight: 500; cursor: pointer; transition: all .2s;
}
.btn-primary { background: #4f6ef7; color: #fff; }
.btn-primary:hover { background: #3b5de7; }
.btn-secondary { background: #f0f2f5; color: #333; }
.btn-secondary:hover { background: #e4e6eb; }

.error-msg {
  margin-top: 8px; padding: 8px 14px; background: #fef2f2; border: 1px solid #fecaca;
  border-radius: 6px; font-size: 13px; color: #dc2626; display: none;
  font-family: "SF Mono", Monaco, monospace;
}
.error-msg.show { display: block; }

.tips {
  margin-top: 20px; padding: 12px 16px; background: #fffbe6;
  border: 1px solid #ffe58f; border-radius: 8px; font-size: 13px; color: #8c6e00; display: none;
}
.tips.show { display: block; }

@media (max-width: 700px) {
  .main-row { flex-direction: column; }
  textarea { height: 260px; }
}
</style>
</head>
<body>

<div class="container">
  <a class="back" href="../index.html">&larr; 返回工具箱</a>
  <h1>JSON 格式化</h1>
  <p class="subtitle">美化、压缩、校验 JSON 数据</p>

  <div class="main-row">
    <!-- 左栏：输入 -->
    <div class="col-left">
      <div class="label"><span>输入</span><span class="hint">粘贴原始 JSON</span></div>
      <textarea id="input-area" placeholder='粘贴 JSON，例如：{"name":"张三","age":25}' oninput="autoFormat()"></textarea>

      <div class="option-row">
        <label><input type="radio" name="mode" value="beautify" checked onchange="formatNow()"> 美化</label>
        <label><input type="radio" name="mode" value="compress" onchange="formatNow()"> 压缩</label>
        <label>缩进 <input type="number" id="indent" value="2" min="1" max="8" onchange="formatNow()"> 空格</label>
      </div>

      <div class="actions">
        <button class="btn btn-primary" onclick="formatNow()">格式化</button>
        <button class="btn btn-secondary" onclick="clearAll()">清空</button>
        <button class="btn btn-secondary" onclick="loadDemo()">示例</button>
      </div>

      <div class="error-msg" id="error-msg"></div>
    </div>

    <!-- 右栏：结果 -->
    <div class="col-right">
      <div class="label"><span>结果</span><span class="stat" id="stat"></span></div>
      <textarea id="output-area" readonly placeholder="格式化结果将显示在这里"></textarea>
      <div class="actions" style="margin-top:12px">
        <button class="btn btn-primary" onclick="copyOutput()">复制结果</button>
      </div>
    </div>
  </div>

  <div class="tips" id="tips">已复制到剪贴板</div>
</div>

<script>
var inputEl = document.getElementById('input-area');
var outputEl = document.getElementById('output-area');
var errorEl = document.getElementById('error-msg');
var statEl = document.getElementById('stat');
var tipsEl = document.getElementById('tips');

function autoFormat() { formatNow(); }

function formatNow() {
  var raw = inputEl.value.trim();
  if (!raw) { outputEl.value = ''; statEl.textContent = ''; errorEl.classList.remove('show'); return; }

  var mode = document.querySelector('input[name="mode"]:checked').value;
  var indent = parseInt(document.getElementById('indent').value) || 2;

  try {
    var obj = JSON.parse(raw);
    if (mode === 'compress') {
      outputEl.value = JSON.stringify(obj);
    } else {
      outputEl.value = JSON.stringify(obj, null, indent);
    }
    var size = new Blob([raw]).size;
    var outSize = new Blob([outputEl.value]).size;
    statEl.textContent = '输入 ' + formatSize(size) + ' ｜ 输出 ' + formatSize(outSize);
    errorEl.classList.remove('show');
  } catch (e) {
    errorEl.textContent = 'JSON 解析错误: ' + e.message;
    errorEl.classList.add('show');
    statEl.textContent = '';
  }
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  return (bytes / 1024).toFixed(1) + ' KB';
}

function copyOutput() {
  if (!outputEl.value) return;
  outputEl.select(); document.execCommand('copy');
  if (navigator.clipboard) navigator.clipboard.writeText(outputEl.value);
  tipsEl.classList.add('show');
  setTimeout(function() { tipsEl.classList.remove('show'); }, 1500);
}

function clearAll() {
  inputEl.value = ''; outputEl.value = ''; statEl.textContent = '';
  errorEl.classList.remove('show');
}

function loadDemo() {
  inputEl.value = '{"orderId":"20240528001","user":{"name":"张三","phone":"13800138000"},"items":[{"id":1,"name":"iPhone 15 Pro","price":8999,"qty":1},{"id":2,"name":"AirPods Pro","price":1899,"qty":2}],"status":"paid","total":12797}';
  formatNow();
}
</script>
</body>
</html>
